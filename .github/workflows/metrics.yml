name: Metrics (Lines)
on:
  schedule: [{ cron: "0 0 * * *" }]
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  lines:
    runs-on: ubuntu-latest
    steps:
      - name: Prep output dir
        run: mkdir -p dist
      - name: Lines (light)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: dist/lines.svg
          output_action: none
          base: ""
          template: classic
          plugin_lines: yes
          plugin_lines_sections: base, repositories, history
          plugin_lines_repositories_limit: 4
          plugin_lines_history_limit: 1
          plugin_lines_delay: 30
      - name: Lines (dark)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: dist/lines-dark.svg
          output_action: none
          base: ""
          template: classic
          config_display: large
          plugin_lines: yes
          plugin_lines_sections: base, repositories, history
          plugin_lines_repositories_limit: 4
          plugin_lines_history_limit: 1
          plugin_lines_delay: 30
      - name: Debug listing
        run: ls -la dist || true
      - name: Publish to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          keep_history: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
